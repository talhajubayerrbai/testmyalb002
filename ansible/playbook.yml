---
- name: Configure application server
  hosts: all
  become: true
  vars:
    app_dir: /opt/app
    venv_dir: /opt/app/.venv
    app_user: ubuntu
    service_name: myapp

  tasks:
    - name: Update apt cache and install system packages
      ansible.builtin.apt:
        name:
          - python3-pip
          - python3-venv
          - python3-dev
          - nginx
          - build-essential
          - curl
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Copy application code - app package
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../app/"
        dest: "{{ app_dir }}/app/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
        directory_mode: "0755"

    - name: Copy application code - main.py
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../main.py"
        dest: "{{ app_dir }}/main.py"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"

    - name: Copy requirements.txt (if present)
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../requirements.txt"
      register: req_stat
      delegate_to: localhost
      become: false

    - name: Upload requirements.txt
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../requirements.txt"
        dest: "{{ app_dir }}/requirements.txt"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      when: req_stat.stat.exists

    - name: Copy public/ directory (if present)
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../public"
      register: public_stat
      delegate_to: localhost
      become: false

    - name: Sync public/ directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../public/"
        dest: "{{ app_dir }}/public/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
        directory_mode: "0755"
      when: public_stat.stat.exists

    - name: Create Python virtual environment
      ansible.builtin.command:
        cmd: python3 -m venv {{ venv_dir }}
        creates: "{{ venv_dir }}/bin/python"
      become_user: "{{ app_user }}"

    - name: Upgrade pip in virtual environment
      ansible.builtin.pip:
        name: pip
        state: latest
        virtualenv: "{{ venv_dir }}"
        virtualenv_command: python3 -m venv

    - name: Install application dependencies
      ansible.builtin.pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ venv_dir }}"
        virtualenv_command: python3 -m venv
      when: req_stat.stat.exists

    - name: Install core dependencies (gunicorn, uvicorn, fastapi)
      ansible.builtin.pip:
        name:
          - gunicorn
          - uvicorn[standard]
          - fastapi
          - python-multipart
          - aiofiles
        virtualenv: "{{ venv_dir }}"
        virtualenv_command: python3 -m venv

    - name: Deploy systemd service unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/myapp.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=myapp FastAPI application
          After=network.target

          [Service]
          Type=simple
          User={{ app_user }}
          WorkingDirectory={{ app_dir }}
          Environment=PORT=8000
          Environment=APP_ENV=production
          ExecStart={{ venv_dir }}/bin/gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:8000
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start myapp service
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        enabled: true
        state: restarted

    - name: Deploy Nginx configuration
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/myapp
        owner: root
        group: root
        mode: "0644"
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name _;

              location / {
                  proxy_pass http://127.0.0.1:8000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_connect_timeout 60s;
                  proxy_send_timeout 60s;
                  proxy_read_timeout 60s;
              }

              location /health {
                  proxy_pass http://127.0.0.1:8000/health;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  access_log off;
              }
          }

    - name: Remove default Nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Enable myapp Nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/myapp
        dest: /etc/nginx/sites-enabled/myapp
        state: link

    - name: Test Nginx configuration
      ansible.builtin.command:
        cmd: nginx -t
      changed_when: false

    - name: Enable and restart Nginx
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: restarted

    - name: Wait for application to be ready on port 8000
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 8000
        delay: 5
        timeout: 60

    - name: Verify application responds on /health
      ansible.builtin.uri:
        url: http://127.0.0.1:8000/health
        method: GET
        status_code: 200
        timeout: 10
      register: health_result
      retries: 5
      delay: 5
      until: health_result.status == 200